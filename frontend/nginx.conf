server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para FastAPI — evita CORS e bake de URL no bundle
    location /api/ {
        proxy_pass http://fastapi:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA routing: qualquer rota nao-arquivo cai no index.html (React Router client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets versionados pelo Vite (hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Nao cachear index.html (sempre buscar versao fresca)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
